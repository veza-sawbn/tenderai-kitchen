version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m compileall .

run:
  runtime-version: 3.11.14
  pre-run:
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt
  command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 180 app:app
  network:
    port: 8080
  env:
    - name: PORT
      value: "8080"
    - name: PYTHONUNBUFFERED
      value: "1"
