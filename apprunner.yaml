version: 1.0
runtime: python311

build:
  commands:
    build:
      - echo "Build phase started"

run:
  runtime-version: "3.11"
  pre-run:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install -r requirements.txt
  command: python3 -m gunicorn app:app --bind 0.0.0.0:8080 --workers 1 --threads 4 --timeout 120
  network:
    port: 8080
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: INGEST_MAX_PAGES
      value: "1"
    - name: ETENDERS_TIMEOUT_SECONDS
      value: "8"
    - name: ETENDERS_PAGE_SIZE
      value: "25"
    - name: ETENDERS_LOOKBACK_DAYS
      value: "14"
    - name: ETENDERS_LOOKAHEAD_DAYS
      value: "30"
    - name: DATABASE_URL
      value: "postgresql+psycopg://tenderai_admin:119988Sawbona@tenderai-db.c3kg8kwoutl7.eu-central-1.rds.amazonaws.com:5432/postgres"
    - name: FLASK_SECRET_KEY
      value: "tenderai-prod-6f4c1d1f7bb348a68f11f5d24b9c5f8e"
    - name: ADMIN_TOKEN
      value: "run-tender-ingest"
