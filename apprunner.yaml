version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m pip install --upgrade pip
      - python3 -m pip install -r requirements.txt
      - python3 -m pip show gunicorn

run:
  runtime-version: 3.11
  command: python3 -m gunicorn app:app --bind 0.0.0.0:8080 --workers 1 --threads 4 --timeout 120
  network:
    port: 8080
  env:
    - name: OPENAI_PARSER_MODEL
      value: "gpt-4o-mini"
    - name: PARSER_MODE
      value: "auto"
    - name: APP_VERSION
      value: "20260319-beta-7"
    - name: FLASK_SECRET_KEY
      value: "replace-this-with-a-real-secret"
    - name: DATABASE_URL
      value: "sqlite:////tmp/tenderai.db"
  secrets:
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:eu-central-1:366339681462:secret:tenderai/prod/app-AAFPUZ"
