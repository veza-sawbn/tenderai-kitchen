version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m compileall .

run:
  runtime-version: 3.11.14
  pre-run:
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt
  command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 180 app:app
  network:
    port: 8080
  env:
    - name: OPENAI_PARSER_MODEL
      value: "gpt-4o-mini"
    - name: PARSER_MODE
      value: "auto"
    - name: APP_VERSION
      value: "20260320-beta-17"
    - name: FLASK_SECRET_KEY
      value: "replace-this-with-a-real-secret"
    - name: PORT
      value: "8080"
  secrets:
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:eu-central-1:366339681462:secret:tenderai/prod/app-AAFPUZ"
