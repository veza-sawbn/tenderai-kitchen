{% extends "base.html" %}

{% block content %}
<section class="content-section">
  <div class="section-head">
    <h1>Supplier Profiles</h1>
    <p>Upload and manage supplier capability profiles.</p>
  </div>

  <form id="profileUploadForm" class="upload-form">
    <input type="file" id="profileFile" accept=".pdf" required>
    <button type="submit" class="btn btn-primary">Upload Profile</button>
  </form>

  <div id="profileUploadStatus" class="analyze-status hidden">
    <div class="spinner"></div>
    <span>Parsing supplier profile...</span>
  </div>

  <div id="profileError" class="page-error hidden"></div>
  <div id="profilesList" class="results-grid"></div>
</section>

<script>
const profileUploadForm = document.getElementById("profileUploadForm");
const profileFile = document.getElementById("profileFile");
const profileUploadStatus = document.getElementById("profileUploadStatus");
const profileError = document.getElementById("profileError");
const profilesList = document.getElementById("profilesList");

async function loadProfiles() {
  const res = await fetch("/api/profiles");
  const data = await res.json();

  profilesList.innerHTML = data.map(p => `
    <article class="result-card">
      <div class="result-card-top">
        <div>
          <p class="result-buyer">Profile</p>
          <h3 class="result-title">${p.name || p.filename || ("Profile " + p.id)}</h3>
        </div>
        <div class="fit-badge">ID ${p.id}</div>
      </div>
      <pre>${JSON.stringify(p.parsed_json || {}, null, 2)}</pre>
    </article>
  `).join("");
}

profileUploadForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  profileError.classList.add("hidden");
  profileError.textContent = "";

  const file = profileFile.files[0];
  if (!file) {
    profileError.textContent = "Please select a PDF file";
    profileError.classList.remove("hidden");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  profileUploadStatus.classList.remove("hidden");

  try {
    const res = await fetch("/api/profiles", {
      method: "POST",
      body: formData
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Upload failed");
    }

    await loadProfiles();
    profileFile.value = "";
  } catch (err) {
    profileError.textContent = err.message || "Upload failed";
    profileError.classList.remove("hidden");
  } finally {
    profileUploadStatus.classList.add("hidden");
  }
});

loadProfiles();
</script>
{% endblock %}
