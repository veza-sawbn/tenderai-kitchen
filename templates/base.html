<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ title or "TenderAI V3" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#070b14">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v={{ app_version }}">
  </head>
  <body>
    <div class="ambient ambient-cyan"></div>
    <div class="ambient ambient-purple"></div>

    <header class="site-header">
      <a class="brand" href="{{ url_for('home') }}">
        <span class="brand-mark"></span>
        <span>TenderAI V3</span>
      </a>

      <nav class="site-nav">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('profiles_page') }}">Profiles</a>
        <a href="{{ url_for('tenders_page') }}">Tenders</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="flash-stack shell">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer shell">
      <div>Build {{ app_version }}</div>
      <div>/health available</div>
    </footer>
  </body>
</html>
